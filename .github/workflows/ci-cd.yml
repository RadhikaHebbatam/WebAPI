name: Product Catalogue API - CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore "ProductCatalogueAPI/ProductCatalogueAPI.sln"

      - name: Build solution
        run: dotnet build "ProductCatalogueAPI/ProductCatalogueAPI.sln" --configuration Release --no-restore

      - name: Run tests
        run: dotnet test "ProductCatalogueAPI/ProductCatalogueAPI.sln" --configuration Release --no-build --verbosity normal

      - name: Publish application (Windows)
        run: dotnet publish "ProductCatalogueAPI/ProductCatalogueAPI/ProductCatalogueAPI.csproj" --configuration Release --output ./publish-win --runtime win-x64 --self-contained false

      - name: Publish application (Linux)
        run: dotnet publish "ProductCatalogueAPI/ProductCatalogueAPI/ProductCatalogueAPI.csproj" --configuration Release --output ./publish-linux --runtime linux-x64 --self-contained false

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app-win
          path: ./publish-win
          retention-days: 5

      - name: Upload Linux build artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app-linux
          path: ./publish-linux
          retention-days: 5

  deploy-local:
    name: Deploy to Local Machine
    runs-on: self-hosted
    needs: build-and-test

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app-win
          path: C:\Deploy\ProductCatalogueAPI\publish

      - name: Stop existing app if running
        shell: powershell
        run: |
          $processName = "ProductCatalogueAPI"
          $process = Get-Process -Name $processName -ErrorAction SilentlyContinue
          if ($process) {
              Write-Host "Stopping existing process..."
              Stop-Process -Name $processName -Force
              Start-Sleep -Seconds 2
              Write-Host "Process stopped."
          } else {
              Write-Host "No existing process - clean deploy."
          }

      - name: Backup previous deployment
        shell: powershell
        run: |
          $deployPath = "C:\Deploy\ProductCatalogueAPI\app"
          $backupPath = "C:\Deploy\ProductCatalogueAPI\backup"
          if (Test-Path $deployPath) {
              Write-Host "Backing up..."
              if (Test-Path $backupPath) {
                  Remove-Item $backupPath -Recurse -Force
              }
              Copy-Item $deployPath $backupPath -Recurse -Force
              Write-Host "Backup created."
          } else {
              Write-Host "No previous deployment - skipping backup."
              New-Item -ItemType Directory -Force -Path $deployPath
          }

      - name: Deploy files
        shell: powershell
        run: |
          $source = "C:\Deploy\ProductCatalogueAPI\publish"
          $dest   = "C:\Deploy\ProductCatalogueAPI\app"
          Write-Host "Deploying to $dest..."
          New-Item -ItemType Directory -Force -Path $dest
          Copy-Item "$source\*" $dest -Recurse -Force
          Write-Host "Files deployed."

      - name: Inject connection string
        shell: powershell
        env:
          DB_CONNECTION: ${{ secrets.DEV_CONNECTION_STRING }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
        run: |
          $appSettings = "C:\Deploy\ProductCatalogueAPI\app\appsettings.json"
          Write-Host "Injecting configuration..."
          $config = Get-Content $appSettings -Raw | ConvertFrom-Json
          $config.ConnectionStrings.DefaultConnection = $env:DB_CONNECTION
          $config.AzureOpenAI.Endpoint = $env:AZURE_OPENAI_ENDPOINT
          $config.AzureOpenAI.ApiKey = $env:AZURE_OPENAI_KEY
          $config | ConvertTo-Json -Depth 10 | Set-Content $appSettings
          Write-Host "Configuration injected."

      - name: Start application
        shell: powershell
        run: |
          $exePath    = "C:\Deploy\ProductCatalogueAPI\app\ProductCatalogueAPI.exe"
          $workingDir = "C:\Deploy\ProductCatalogueAPI\app"
          Write-Host "Starting application..."
          Start-Process -FilePath $exePath -WorkingDirectory $workingDir -WindowStyle Hidden
          Start-Sleep -Seconds 5
          Write-Host "Application started."

      - name: Health check
        shell: powershell
        run: |
          $url     = "http://localhost:5000/health"
          $retries = 5
          $delay   = 3
          Write-Host "Running health check at $url..."
          for ($i = 1; $i -le $retries; $i++) {
              try {
                  $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 5
                  if ($response.StatusCode -eq 200) {
                      Write-Host "Health check passed!"
                      exit 0
                  }
              } catch {
                  Write-Host "Attempt $i of $retries - retrying in ${delay}s..."
                  Start-Sleep -Seconds $delay
              }
          }
          Write-Host "Health check failed."
          exit 1

      - name: Deployment summary
        shell: powershell
        run: |
          Write-Host "Deployment Complete!"
          Write-Host "Folder:  C:\Deploy\ProductCatalogueAPI\app"
          Write-Host "URL:     http://localhost:5000"
          Write-Host "Swagger: http://localhost:5000/swagger"
          Write-Host "Health:  http://localhost:5000/health"

  deploy-azure:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app-linux
          path: ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'YOUR-APP-SERVICE-NAME-HERE'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish

      - name: Deployment summary
        run: |
          echo "Deployment Complete!"
          echo "URL:     https://YOUR-APP-SERVICE-NAME-HERE.azurewebsites.net"
          echo "Swagger: https://YOUR-APP-SERVICE-NAME-HERE.azurewebsites.net/swagger"
